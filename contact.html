<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Beef Studio</title>
  <meta name="description" content="Get in touch with Beef Studio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Instrument+Serif:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('beef-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="site">
    <header class="top">
      <button class="hamburger" id="hamburger" aria-label="Open navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <a class="mark" href="/" aria-label="Beef Studio — home">
        <img class="mark-logo" src="/beef_logo/beef_logo.png" alt="">
      </a>
      <div class="top-right">
        <nav class="nav" aria-label="Primary">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/work.html">Work</a>
          <a class="nav-link" href="/about.html">About</a>
          <a class="nav-link" href="/contact.html" aria-current="page">Contact</a>
        </nav>
        <button class="toggle" id="theme-toggle" aria-label="Toggle light and dark mode" aria-pressed="false">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </header>

    <nav class="mobile-menu" id="mobile-menu" aria-label="Mobile navigation">
      <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close navigation">&#x2715;</button>
      <a class="nav-link" href="/">Home</a>
      <a class="nav-link" href="/work.html">Work</a>
      <a class="nav-link" href="/about.html">About</a>
      <a class="nav-link" href="/contact.html" aria-current="page">Contact</a>
    </nav>

    <main>
      <section class="page-intro">
        <h1><span class="grad-text">Contact</span></h1>
        <p class="lede">Tell us about your project. We read everything and reply within a few days.</p>
      </section>

      <hr class="grad-rule">

      <section class="section about-body">
        <p class="section-label">Email</p>
        <p><a href="mailto:hello@beefstudio.example">hello@beefstudio.example</a></p>

        <p class="section-label" style="margin-top:32px">Studio</p>
        <address>
          Placeholder Street<br>
          Boston, MA 02XXX<br>
          United States
        </address>

        <p class="section-label" style="margin-top:32px">Send a note</p>
        <form class="contact-form" action="#" method="post" novalidate>
          <label>
            Your name
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            Message
            <textarea name="message" rows="6" required></textarea>
          </label>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year">2026</span> Beef Studio · Boston, MA</p>
      <p><a href="/contact.html">Get in touch →</a></p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
